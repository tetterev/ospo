# ──────────────────────────────────────────────────────────────────────────────
# Allianz OSPO — Third-Party License Policy
#
# This file defines which open-source licenses are denied in pull requests
# across the Allianz GitHub organization. It is used by the dependency review
# action to block PRs that introduce dependencies with non-compliant licenses.
#
# Parameters:
#   deny-licenses:  SPDX identifiers of licenses that are not permitted.
#
# Want to propose a change? Open a pull request and describe your reasoning.

# ──────────────────────────────────────────────────────────────────────────────

deny-licenses:
  # Copyleft
  - GPL-2.0
  - GPL-2.0-only
  - GPL-2.0-or-later
  - GPL-3.0
  - GPL-3.0-only
  - GPL-3.0-or-later
  - AGPL-3.0
  - AGPL-3.0-only
  - AGPL-3.0-or-later
  # Commercial / source-available
  - BUSL-1.1
  - Elastic-2.0
  - SSPL-1.0
  - PolyForm-Noncommercial-1.0.0
  - PolyForm-Small-Business-1.0.0
