# ──────────────────────────────────────────────────────────────────────────────
# Allianz OSPO — Repository Compliance Linting Configuration
#
# This file defines the standards every public repository in the Allianz GitHub
# organization must meet. The linter checks these rules automatically and opens
# a GitHub issue in any repository that does not comply.
#
# For more details, see the standards guide:
# https://cmp.allianz.net/spaces/ARGO/pages/2748785293/Mandatory+Repository+Configuration
#
# Parameters:
#   issue_title:      Title of the GitHub issue opened in non-compliant repositories.
#                     Also used as the lookup key — changing this breaks detection of
#                     previously opened issues.
#   docs_link:        URL inserted into the issue body as the standards guide link.
#   excluded_repos:   Repository names to skip entirely — no checks, no issues.
#   allowed_licenses: SPDX identifiers accepted by the license check. Must match
#                     the spdx_id returned by the GitHub API.
#   required_files:   Files every repository must contain.
#                     - pattern:      Case-insensitive prefix glob (e.g. README* matches README.md)
#                     - description:  Check name shown in issue body and output
#                     - search_paths: Directories to search (default: repo root only)
#   description_length: Minimum and maximum character length for repository descriptions.
#                     Descriptions outside this range fail the check.
#   allowed_topics:   Approved topic vocabulary. Every repository must have 1–5 topics,
#                     all from this list. An empty list disables the allowlist check.
#
# Want to propose a change? Open a pull request and describe your reasoning.

# ──────────────────────────────────────────────────────────────────────────────


# Title of the GitHub issue opened in non-compliant repositories.
# Change this only if you want to rename the issue across all future runs.
issue_title: "Mandatory Repository Configuration"
docs_link: "https://cmp.allianz.net/spaces/ARGO/pages/2748785293/Mandatory+Repository+Configuration"

# Repositories to exclude from linting entirely.
excluded_repos: [
  ".github",  # Special repository for GitHub configuration.
  "ng-aquila" # Custom MIT license. Needs clarification from legal.
]

# Minimum and maximum character length for repository descriptions.
# The description appears in the organisation repository list and in `gh repo view`.
description_length:
  min: 30
  max: 150

# Licenses repositories are allowed to use.
# The value must match the SPDX identifier shown on https://spdx.org/licenses/
# To permit an additional license, add its SPDX ID here and open a pull request.
allowed_licenses:
  - Apache-2.0
  - MIT
  - CC-BY-4.0
  - CC0-1.0

# Files that every repository must contain.
# - pattern: case-insensitive glob matched against filenames (e.g. README* matches README.md)
# - search_paths: directories to search (default: repo root only)
# Adding a new entry here makes that file mandatory for all repositories.
required_files:
  - pattern: "README*"
    description: "Readme File"
  - pattern: "CONTRIBUTING*"
    search_paths: [".", ".github", "docs"]
    description: "Contributing File"
  - pattern: "LICENSE*"
    description: "License File"

# Allowed topics for repositories. New topics can be suggested.
# Topics are used for filtering and organisation-wide statistics, so a controlled
# vocabulary prevents synonym drift (e.g. "k8s" vs "kubernetes").
# Every repository must have between 1 and 5 topics, all from this list.
allowed_topics:
  # Project type                                                                                                                   
  - api                                                                                                                            
  - cli                                                                                                                            
  - docs                                                                                                                           
  - iac                                                                       
  - library                                                                                                                        
  - mobile                                                                                                                         
  - sdk                                                                                                                            
  - service                                                                                                                        
  - template                                                                                                                       
  - web                                                                                                                            
  # Domain                                                                                                                         
  - ai                                                                                                                             
  - analytics                                                                                                                      
  - automation                                                                                                                     
  - batch                                                                                                                          
  - data                                                                                                                           
  - devops
  - network
  - security
  - streaming
  # Ecosystem — platform or framework the repository is built for or extends
  - angular
  - aws
  - azure
  - docker
  - github-actions
  - helm
  - kafka
  - kubernetes
  - terraform
