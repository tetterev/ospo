# Configuration File for GitHub Repositories
#
# This file manages settings for GitHub repositories within the Allianz organization.
# Each entry represents a repository that should exist in the org with the
# specified team assignments and policy settings.
#
# For more details, see the project launch guide:
# https://cmp.allianz.net/spaces/ARGO/pages/2748785094/Launching+an+Open+Source+Project
#
# Parameters:
#   name:               Repository name (lowercase, alphanumeric, dots, hyphens)
#   security:           'managed' (default) — OSPO enforces GHAS settings via org config
#                       'custom' — repo team controls GHAS settings
#   branch-protection:  'managed' (default) — OSPO enforces branch protection via org ruleset
#                       'custom' — repo team defines its own branch protection rules
#   access[].team:      Team display name; must match the corresponding Entra ID group name exactly
#   access[].role:      'own' (default) — full repo ownership via custom org role
#                       'write' — push access
#                       'triage' — read + triage issues and PRs, no push access
#
# To add a repository, complete the project launch process first, then open a pull request.

# ──────────────────────────────────────────────────────────────────────────────


# Repositories managed in the Allianz GitHub organization.
# Example:
#   - name: "my-project"
#     security: managed
#     branch-protection: managed
#     access:
#     - team: "My Project Team"
#       role: own
#     - team: "Ops Team"
#       role: triage 
repositories:

  - name: ".github"
    access:
    - team: "Allianz OSPO"

  - name: "ospo"
    access:
    - team: "Allianz OSPO"

  - name: "ng-aquila"
    security: custom
    branch-protection: custom
    access:
    - team: "ng-aquila"

  - name: "calculus-prime-pnc"

  - name: "gem-config"

  - name: "license-scout"

  - name: "merge-bot"

  - name: "merge-bot-config"

  - name: "merge-processor"

  - name: "yukimi"
    access:
    - team: "Yukimi"
  
